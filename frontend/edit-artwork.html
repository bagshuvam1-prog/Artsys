<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Artwork — Artsys</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <header id="site-header">
    <a href="index.html" class="wordmark">ARTSYS</a>
    <nav>
      <a href="gallery.html">Back to gallery</a>
      <span id="auth-status"></span>
    </nav>
  </header>

  <main class="catalogue-wrap">
    <h1>Edit Artwork</h1>
    <p class="subhead">Update this piece's details</p>

    <form id="edit-artwork-form">
      <label>Image</label>
      <div class="dropzone" id="dropzone">
        <img class="preview" id="image-preview" alt="">
        <p id="dropzone-text">Drop artwork here</p>
        <p class="browse">or click to browse files</p>
      </div>
      <input type="file" id="image-file" accept="image/*" style="display: none;">

      <label>Title</label>
      <input type="text" id="title" required>

      <label>Artist</label>
      <input type="text" id="artist" required>

      <label>Description</label>
      <textarea id="description"></textarea>

      <button type="submit">Save Changes</button>
    </form>
  </main>

  <footer>
    <p class="foot-wordmark">ARTSYS</p>
    <p class="foot-line">Digital Collection · 2026</p>
    <div class="foot-links">
      <a href="index.html">Home</a>
      <a href="gallery.html">Gallery</a>
      <a href="#">Instagram</a>
      <a href="#">Contact</a>
    </div>
    <p class="foot-tag">Curated with care.</p>
  </footer>

  <script src="scripts/app.js"></script>
</body>
</html>
