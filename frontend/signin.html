<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign In — Artsys</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <header id="site-header">
    <a href="index.html" class="wordmark">ARTSYS</a>
    <nav>
      <a href="gallery.html">Gallery</a>
      <span id="auth-status"></span>
    </nav>
  </header>

  <main class="catalogue-wrap">
    <h1>Sign In</h1>
    <p class="subhead">Welcome back</p>

    <form id="signin-form">
      <label>Email</label>
      <input type="email" id="email" required>

      <label>Password</label>
      <input type="password" id="password" required>

      <button type="submit">Sign In</button>
    </form>

    <p class="auth-switch">Don't have an account? <a href="signup.html">Sign up</a></p>
  </main>

  <footer>
    <p class="foot-wordmark">ARTSYS</p>
    <p class="foot-line">Digital Collection · 2026</p>
    <div class="foot-links">
      <a href="index.html">Home</a>
      <a href="gallery.html">Gallery</a>
      <a href="#">Instagram</a>
      <a href="#">Contact</a>
    </div>
    <p class="foot-tag">Curated with care.</p>
  </footer>

  <script src="scripts/app.js"></script>
</body>
</html>
